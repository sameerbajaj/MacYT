name: Build and Release macOS App

on:
  push:
    tags:
      - 'v*' # Trigger on version tags, e.g., v1.0.0

jobs:
  build:
    runs-on: macos-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      
    - name: Select Xcode Version
      run: sudo xcode-select -switch /Applications/Xcode_15.4.app
      
    - name: Build App
      run: |
        xcodebuild -project MacYT.xcodeproj -scheme MacYT -configuration Release clean build SYMROOT="$(PWD)/build"
        
    - name: Create DMG using hdiutil
      run: |
        # Wait until build exists
        APP_PATH="build/Release/MacYT.app"
        DMG_NAME="MacYT-${{ github.ref_name }}.dmg"
        
        # Install create-dmg via brew
        brew install create-dmg
        
        create-dmg \
          --volname "MacYT" \
          --volicon "$APP_PATH/Contents/Resources/AppIcon.icns" \
          --window-pos 200 120 \
          --window-size 600 400 \
          --icon-size 100 \
          --icon "MacYT.app" 150 190 \
          --hide-extension "MacYT.app" \
          --app-drop-link 450 190 \
          "build/$DMG_NAME" \
          "$APP_PATH"
          
    - name: Generate Sparkle Signature (Optional)
      run: |
        # If using Sparkle, generate EdDSA signature here using generate_appcast
        # Requires $SPARKLE_PRIVATE_KEY secret
        # ./Sparkle/bin/sign_update build/MacYT-${{ github.ref_name }}.dmg
        echo "Requires Sparkle setup to generate signature"
        
    - name: Create GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        files: build/MacYT-${{ github.ref_name }}.dmg
        name: Release ${{ github.ref_name }}
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
